---
- name: Ensure all configured locales are present.
  locale_gen: 
    name: "{{ item }}" 
    state: present
  with_items: "{{ postgresql_locales }}"
  register: locale_gen_result
  notify: restart postgresql

- name: Template postgresql.conf
  template: 
    src: "{{ ansible_distribution }}-{{ ansible_distribution_version.split('.')[0] }}-postgresql.conf.j2"
    dest: "{{ postgresql_dir }}/postgresql.conf.j2"
    owner: postgres
    group: postgres
    mode: '0644'
  notify: restart postgresql

- name: Template pg_hba.conf
  template: 
    src: pg_hba.conf.j2
    dest: "{{ postgresql_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: '0640'
  notify: restart postgresql
