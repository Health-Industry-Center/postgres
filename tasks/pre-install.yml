---
- name: change user shell to bash
  user:
    name: "{{ deploy_user }}"
    shell: /bin/bash

- name: Install depend Debian
  apt:
    name: "{{ item }}"
    state: present 
    update_cache: yes 
    install_recommends: yes
  environment:
    - NEEDRESTART_MODE: automatically
  with_items:
  - libpq-dev
  - python3-psycopg2
  when: ansible_os_family == 'Debian'

- name: Install depend RedHat
  dnf:
    name: "{{ item }}"
    state: present 
    update_cache: yes 
    install_recommends: yes
  environment:
    - NEEDRESTART_MODE: automatically
  with_items:
  - libpq-dev
  - python3-psycopg2
  when: ansible_os_family == 'RedHat'
