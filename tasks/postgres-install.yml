---
- name: Install postgresql Debian
  apt:
    name: "{{ item }}"
    state: present 
    update_cache: yes 
    install_recommends: yes
  environment:
    - NEEDRESTART_MODE: automatically
  with_items:
  - postgresql
  - postgresql-contrib
  when: ansible_os_family == 'Debian'

- name: Install postgresql RedHat
  dnf:
    name: "{{ item }}"
    state: present 
    update_cache: yes 
    install_recommends: yes
  environment:
    - NEEDRESTART_MODE: automatically
  with_items:
  - postgresql14-server
  when: ansible_os_family == 'RedHat'

- name: started and enabled PostgreSQL
  service:
    name: postgresql
    state: started
    enabled: true

- name: Ensure PostgreSQL unix socket dirs exist.
  file:
    path: /var/run/postgresql
    state: directory
    owner: postgres
    group: postgres
    mode: 0775
